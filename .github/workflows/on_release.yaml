name: Create release artifacts

on:
  release:
    types:
      - released
    tags:
      - 'v*'


permissions:
  contents: read

jobs:
  release:
    uses: newrelic/coreint-automation/.github/workflows/reusable_on_release.yaml@v3
    with:
      integration: kafka
      tag: ${{ github.event.release.tag_name }}
      publish_schema: "ohi-jmx"
      upload_fips_packages: true
    secrets: inherit
